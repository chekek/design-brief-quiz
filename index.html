<title>Бриф на дизайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.18);
  --accent: #a32035;
  --accent2: #e0bd5c;
  --accent-dim: rgba(163,32,53,0.13);
  --accent-text: #fff;
  --text: #f0f0ee;
  --muted: #6b6b66;
  --muted2: #3a3a36;
  --radius: 16px;
  --radius-sm: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Onest',sans-serif;
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:24px 16px 48px;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

.quiz-shell{
  position:relative;z-index:1;
  width:100%;max-width:560px;
}

/* ── HEADER ── */
.quiz-header{text-align:center;margin-bottom:36px;padding-top:8px;}
.quiz-header .eyebrow{
  font-family:'Unbounded',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:0.2em;color:var(--accent2);
  text-transform:uppercase;margin-bottom:14px;
}
.quiz-header h1{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(20px,6vw,30px);
  font-weight:800;line-height:1.15;color:var(--text);
}
.quiz-header p{
  margin-top:10px;font-size:14px;
  color:var(--muted);max-width:360px;
  margin-left:auto;margin-right:auto;
}

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:28px;}
.progress-meta{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);
  margin-bottom:8px;
  font-family:'Unbounded',sans-serif;
}
.progress-track{height:2px;background:var(--muted2);border-radius:2px;overflow:hidden;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* ── STEP ANIMATION ── */
.step{display:none;animation:fadeUp 0.32s cubic-bezier(0.4,0,0.2,1);}
.step.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px 20px;
}
@media(min-width:420px){.card{padding:28px 28px 24px;}}

.step-q{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(15px,4vw,19px);
  font-weight:600;color:var(--text);
  margin-bottom:5px;line-height:1.35;
}
.step-hint{font-size:13px;color:var(--muted);margin-bottom:18px;}

/* ── OPTIONS ── */
.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:20px;
}
.options.cols-1{grid-template-columns:1fr;}

.opt{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:11px 13px;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s,transform 0.1s;
  text-align:left;
  display:flex;flex-direction:column;gap:3px;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:72px;
}
.opt:active{transform:scale(0.97);}
@media(hover:hover){
  .opt:hover{border-color:var(--border-hover);background:#222;transform:translateY(-1px);}
}
.opt.selected{border-color:var(--accent);background:var(--accent-dim);}
.opt-icon{font-size:19px;margin-bottom:2px;}
.opt-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;}
.opt.selected .opt-title{color:#e8909d;}
.opt-sub{font-size:11px;color:var(--muted);line-height:1.35;}

/* ── EXTRA INPUT (colors / refs) ── */
.extra-input{
  margin-top:12px;margin-bottom:4px;
  animation:fadeUp 0.25s ease;
}
.extra-input label{
  display:block;font-size:12px;
  color:var(--muted);margin-bottom:6px;
}
.extra-input textarea,.extra-input input[type=text]{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);font-family:'Onest',sans-serif;
  font-size:13px;padding:10px 12px;
  resize:vertical;min-height:72px;
  outline:none;
  transition:border-color 0.15s;
}
.extra-input textarea:focus,.extra-input input[type=text]:focus{
  border-color:rgba(163,32,53,0.5);
}
.extra-input input[type=text]{min-height:auto;resize:none;}

/* ── FILE UPLOAD ── */
.file-drop{
  margin-top:10px;
  border:1px dashed var(--muted2);
  border-radius:var(--radius-sm);
  padding:16px;text-align:center;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
  background:var(--surface2);
}
.file-drop:hover,.file-drop.dragover{
  border-color:var(--accent);
  background:var(--accent-dim);
}
.file-drop input[type=file]{display:none;}
.file-drop-icon{font-size:22px;margin-bottom:6px;}
.file-drop-label{font-size:12px;color:var(--muted);line-height:1.5;}
.file-drop-label b{color:var(--text);font-weight:500;}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.file-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 12px;font-size:12px;
}
.file-item-name{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.file-item-size{color:var(--muted);flex-shrink:0;margin-right:8px;}
.file-item-rm{
  background:none;border:none;
  color:var(--muted);cursor:pointer;
  font-size:16px;padding:0 2px;
  transition:color 0.15s;flex-shrink:0;
}
.file-item-rm:hover{color:#e07070;}
.file-error{font-size:11px;color:#e07070;margin-top:6px;}

/* ── CONTACT STEP ── */
.contact-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.contact-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
.contact-field input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);font-family:'Onest',sans-serif;
  font-size:14px;padding:12px 14px;outline:none;
  transition:border-color 0.15s;
  -webkit-appearance:none;
}
.contact-field input:focus{border-color:rgba(163,32,53,0.5);}
.contact-divider{
  display:flex;align-items:center;gap:10px;
  font-size:11px;color:var(--muted);
}
.contact-divider::before,.contact-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.contact-note{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5;}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.btn-back{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:var(--radius-sm);
  padding:11px 16px;
  font-size:13px;cursor:pointer;
  font-family:'Onest',sans-serif;
  transition:border-color 0.15s,color 0.15s;
  flex-shrink:0;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.btn-back:active{opacity:0.7;}
@media(hover:hover){.btn-back:hover{border-color:var(--border-hover);color:var(--text);}}

.btn-next{
  flex:1;
  background:linear-gradient(135deg,var(--accent),#7a1828);
  color:#fff;border:none;
  border-radius:var(--radius-sm);
  padding:13px 20px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Unbounded',sans-serif;
  transition:opacity 0.15s,transform 0.1s;
  letter-spacing:-0.01em;
  -webkit-tap-highlight-color:transparent;
}
.btn-next:active:not(:disabled){transform:scale(0.97);}
@media(hover:hover){.btn-next:hover:not(:disabled){opacity:0.88;}}
.btn-next:disabled{opacity:0.3;cursor:default;}

/* ── SUMMARY / SUCCESS ── */
.summary-table{
  border-radius:var(--radius-sm);overflow:hidden;
  margin-bottom:20px;border:1px solid var(--border);
}
.sum-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 13px;font-size:12px;
  border-bottom:1px solid var(--border);
}
.sum-row:last-child{border-bottom:none;}
.sum-row:nth-child(even){background:var(--surface2);}
.sum-key{color:var(--muted);min-width:100px;flex-shrink:0;}
.sum-val{color:var(--text);font-weight:500;word-break:break-word;}

.success-screen{display:none;animation:fadeUp 0.4s cubic-bezier(0.4,0,0.2,1);}
.success-screen.active{display:block;}
.success-icon{
  width:52px;height:52px;border-radius:50%;
  background:var(--accent-dim);
  border:1px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin:0 auto 18px;
}
.success-title{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(18px,5vw,22px);
  font-weight:800;text-align:center;
  margin-bottom:8px;color:var(--text);
}
.success-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px;}
.btn-restart{
  display:block;width:100%;background:none;
  border:1px solid var(--border);color:var(--muted);
  border-radius:var(--radius-sm);padding:12px;
  font-size:13px;cursor:pointer;
  font-family:'Onest',sans-serif;
  margin-top:10px;
  transition:border-color 0.15s,color 0.15s;
}
@media(hover:hover){.btn-restart:hover{border-color:var(--border-hover);color:var(--text);}}

/* ── SPINNER / TOAST ── */
.spinner{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:#3a1a1a;border:1px solid #7a3333;
  color:#f9c0c0;padding:10px 16px;
  border-radius:var(--radius-sm);font-size:13px;
  opacity:0;transition:opacity 0.3s,transform 0.3s;
  z-index:999;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

      const dropEl = document.getElementById('drop_' + key);
      const inpEl  = document.getElementById('inp_'  + key);
      if (!dropEl || !inpEl) return;
      dropEl.addEventListener('click', () => inpEl.click());
      dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('dragover'); });
      dropEl.addEventListener('dragleave', () => dropEl.classList.remove('dragover'));
      dropEl.addEventListener('drop', e => { e.preventDefault(); dropEl.classList.remove('dragover'); handleFiles(key, e.dataTransfer.files); });
      inpEl.addEventListener('change', () => handleFiles(key, inpEl.files));
    });
  });
}

function buildContactHTML(idx) {
  const isLast = idx === TOTAL - 1;
  return `
  <div class="card">
    <div class="step-q">Давайте знакомиться 👋</div>
    <div class="step-hint">Оставьте контакт — мы свяжемся с вами после получения брифа</div>
    <div class="contact-fields">
      <div class="contact-field">
        <label>Ваше имя</label>
        <input type="text" id="contact_name" placeholder="Как к вам обращаться?" oninput="checkContact()" autocomplete="name">
      </div>
      <div class="contact-field">
        <label>Телефон</label>
        <input type="tel"  id="contact_phone" placeholder="+7 (___) ___-__-__" oninput="checkContact()" autocomplete="tel">
      </div>
      <div class="contact-divider">или</div>
      <div class="contact-field">
        <label>Email</label>
        <input type="email" id="contact_email" placeholder="example@mail.ru" oninput="checkContact()" autocomplete="email">
      </div>
    </div>
    <p class="contact-note">Нужно заполнить имя и хотя бы один из контактов</p>
    <div class="nav">
      <span></span>
      <button class="btn-next" id="next-0" disabled onclick="goNext(0)">${isLast ? 'Отправить бриф →' : 'Далее →'}</button>
    </div>
  </div>`;
}

function buildQuizHTML(s, idx) {
  const isLast = idx === TOTAL - 1;
  const optsHTML = s.opts.map(o => `
    <button class="opt" data-val="${o.title}" data-extra="${o.extra || ''}" onclick="toggleOpt(this,${idx})">
      <span class="opt-icon">${o.icon}</span>
      <span class="opt-title">${o.title}</span>
      <span class="opt-sub">${o.sub}</span>
    </button>`).join('');

  // extra blocks (hidden by default)
  let extrasHTML = '';
  if (s.special) {
    s.opts.forEach(o => {
      if (!o.extra) return;
      const key = s.id + '_' + o.extra;
      extrasHTML += `<div class="extra-input" id="extra_${key}" style="display:none">`;

      if (o.extra === 'guideline') {
        extrasHTML += `
          <label>Опишите цвета или вставьте HEX-коды</label>
          <textarea id="txt_${key}" placeholder="Например: фирменный синий #1A4C8B, белый #FFFFFF..." oninput="saveExtra('${key}')"></textarea>
          ${buildDropHTML(key, 'Загрузить гайдлайн / брендбук')}`;
      } else if (o.extra === 'stopcolors') {
        extrasHTML += `
          <label>Какие цвета нельзя использовать?</label>
          <textarea id="txt_${key}" placeholder="Например: красный, оранжевый, #FF0000..." oninput="saveExtra('${key}')"></textarea>`;
      } else if (o.extra === 'reffiles') {
        extrasHTML += `
          <label>Загрузите файлы с референсами</label>
          ${buildDropHTML(key, 'Загрузить референсы')}`;
      }
      extrasHTML += `</div>`;
    });
  }

  return `
  <div class="card">
    <div class="step-q">${s.q}</div>
    <div class="step-hint">${s.hint}</div>
    <div class="options" id="opts-${idx}">${optsHTML}</div>
    ${extrasHTML}
    <div class="nav" style="margin-top:16px">
      ${idx > 0 ? `<button class="btn-back" onclick="goBack()">← Назад</button>` : '<span></span>'}
      <button class="btn-next" id="next-${idx}" disabled onclick="goNext(${idx})">${isLast ? 'Отправить бриф →' : 'Далее →'}</button>
    </div>
  </div>`;
}

function buildDropHTML(key, label) {
  return `
  <div class="file-drop" id="drop_${key}">
    <input type="file" id="inp_${key}" multiple accept="image/*,application/pdf,.ai,.eps,.psd,.fig,.sketch">
    <div class="file-drop-icon">📎</div>
    <div class="file-drop-label"><b>Нажмите или перетащите файлы</b><br>PDF, изображения, AI, PSD · до 20 МБ</div>
  </div>
  <div class="file-list" id="flist_${key}"></div>
  <div class="file-error" id="ferr_${key}"></div>`;
}

// ──────────────────────────────────────────────
//  CONTACT VALIDATION
// ──────────────────────────────────────────────
function checkContact() {
  const name  = (document.getElementById('contact_name')?.value  || '').trim();
  const phone = (document.getElementById('contact_phone')?.value || '').trim();
  const email = (document.getElementById('contact_email')?.value || '').trim();
  const ok = name.length > 0 && (phone.length > 0 || email.length > 0);
  document.getElementById('next-0').disabled = !ok;
  if (ok) {
    answers['contact'] = [`Имя: ${name}`, phone ? `Тел: ${phone}` : null, email ? `Email: ${email}` : null].filter(Boolean);
  }
}

// ──────────────────────────────────────────────
//  OPT TOGGLE
// ──────────────────────────────────────────────
function toggleOpt(btn, stepIdx) {
  const s   = steps[stepIdx];
  const id  = s.id;
  const val = btn.dataset.val;
  const extraKey = btn.dataset.extra;
  const opts = document.querySelectorAll(`#opts-${stepIdx} .opt`);

  if (!s.multi) {
    // single — deselect all, hide all extras
    opts.forEach(o => {
      o.classList.remove('selected');
      const ek = o.dataset.extra;
      if (ek) { const el = document.getElementById('extra_' + id + '_' + ek); if (el) el.style.display = 'none'; }
    });
    btn.classList.add('selected');
    answers[id] = [val];
    // show this extra if any
    if (extraKey) { const el = document.getElementById('extra_' + id + '_' + extraKey); if (el) el.style.display = 'block'; }
  } else {
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      answers[id] = (answers[id] || []).filter(v => v !== val);
      if (extraKey) { const el = document.getElementById('extra_' + id + '_' + extraKey); if (el) el.style.display = 'none'; }
    } else {
      btn.classList.add('selected');
      answers[id] = [...(answers[id] || []), val];
      if (extraKey) { const el = document.getElementById('extra_' + id + '_' + extraKey); if (el) el.style.display = 'block'; }
    }
  }
  document.getElementById('next-' + stepIdx).disabled = !(answers[id] && answers[id].length > 0);
}

// ──────────────────────────────────────────────
//  EXTRA TEXT
// ──────────────────────────────────────────────
function saveExtra(key) {
  const el = document.getElementById('txt_' + key);
  if (el) extraText[key] = el.value.trim();
}

// ──────────────────────────────────────────────
//  FILE HANDLING
// ──────────────────────────────────────────────
function handleFiles(key, fileList) {
  const errEl  = document.getElementById('ferr_' + key);
  const listEl = document.getElementById('flist_' + key);
  if (!fileList || !fileList.length) return;

  if (!attachedFiles[key]) attachedFiles[key] = [];
  let errMsg = '';

  Array.from(fileList).forEach(f => {
    if (f.size > MAX_FILE_BYTES) { errMsg = `Файл «${f.name}» превышает 20 МБ`; return; }
    // check total
    const existing = attachedFiles[key].reduce((s, x) => s + x.size, 0);
    if (existing + f.size > MAX_FILE_BYTES * 3) { errMsg = 'Суммарный размер файлов слишком большой'; return; }
    if (!attachedFiles[key].find(x => x.name === f.name && x.size === f.size)) {
      attachedFiles[key].push(f);
    }
  });

  errEl.textContent = errMsg;
  renderFileList(key);
}

function removeFile(key, name) {
  if (attachedFiles[key]) {
    attachedFiles[key] = attachedFiles[key].filter(f => f.name !== name);
    renderFileList(key);
  }
}

function renderFileList(key) {
  const listEl = document.getElementById('flist_' + key);
  if (!listEl) return;
  const files = attachedFiles[key] || [];
  listEl.innerHTML = files.map(f => `
    <div class="file-item">
      <span class="file-item-name">📄 ${f.name}</span>
      <span class="file-item-size">${(f.size/1024/1024).toFixed(1)} МБ</span>
      <button class="file-item-rm" onclick="removeFile('${key}','${f.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

// ──────────────────────────────────────────────
//  NAVIGATION
// ──────────────────────────────────────────────
function goNext(idx) {
  if (idx === TOTAL - 1) { submitBrief(); return; }
  document.getElementById('step-' + idx).classList.remove('active');
  current = idx + 1;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  document.getElementById('step-' + current).classList.remove('active');
  current--;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const pct = Math.round((current / TOTAL) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('step-label').textContent = `Шаг ${current + 1} из ${TOTAL}`;
  document.getElementById('step-pct').textContent = pct + '%';
}

// ──────────────────────────────────────────────
//  BUILD MESSAGE  (plain text — no parse_mode)
// ──────────────────────────────────────────────
function buildMessage() {
  const now = new Date().toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
  const line = '─'.repeat(28);
  let msg = `📋 Новый бриф на дизайн\n${line}\n🕐 ${now}\n${line}\n\n`;

  steps.forEach(s => {
    const val = (answers[s.id] || []).join(', ') || '—';
    msg += `${labels[s.id]}:\n  ${val}\n`;

    // append extra texts and file names
    if (s.special && s.opts) {
      s.opts.forEach(o => {
        if (!o.extra) return;
        const key = s.id + '_' + o.extra;
        const txt   = extraText[key];
        const files = attachedFiles[key];
        if (txt)              msg += `  └ ${o.title}: ${txt}\n`;
        if (files && files.length) msg += `  └ Файлы (${o.title}): ${files.map(f => f.name).join(', ')}\n`;
      });
    }
    msg += '\n';
  });
  return msg;
}

// ──────────────────────────────────────────────
//  SEND TO TELEGRAM
// ──────────────────────────────────────────────
async function submitBrief() {
  const lastIdx = TOTAL - 1;
  const btn = document.getElementById('next-' + lastIdx);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Отправляем...';

  const msg = buildMessage();

  try {
    // 1. Send text message
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description || 'Telegram API error');

    // 2. Send attached files
    const allFiles = Object.values(attachedFiles).flat();
    for (const file of allFiles) {
      const fd = new FormData();
      fd.append('chat_id', TG_CHAT_ID);
      fd.append('document', file, file.name);
      fd.append('caption', `📎 Файл к брифу: ${file.name}`);
      await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`, { method: 'POST', body: fd });
    }

    showSuccess();
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = 'Отправить бриф →';
    showToast('Ошибка: ' + e.message);
    console.error(e);
  }
}

// ──────────────────────────────────────────────
//  SUCCESS / RESTART
// ──────────────────────────────────────────────
function showSuccess() {
  document.getElementById('progress-wrap').style.display = 'none';
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

  const summary = document.getElementById('final-summary');
  summary.innerHTML = steps.map(s => {
    let val = (answers[s.id] || []).join(', ') || '—';
    return `<div class="sum-row"><span class="sum-key">${labels[s.id]}</span><span class="sum-val">${val}</span></div>`;
  }).join('');

  document.getElementById('success').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  Object.keys(extraText).forEach(k => delete extraText[k]);
  Object.keys(attachedFiles).forEach(k => delete attachedFiles[k]);
  current = 0;
  document.getElementById('success').classList.remove('active');
  document.getElementById('progress-wrap').style.display = '';
  buildSteps();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4500);
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
buildSteps();
updateProgress();
</script>

</html>
