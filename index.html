<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бриф на дизайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --accent-text: #0d0d0d;
    --text: #f0f0ee;
    --muted: #6b6b66;
    --muted2: #3a3a36;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .quiz-shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* header */
  .quiz-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .quiz-header .eyebrow {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .quiz-header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    line-height: 1.15;
    color: var(--text);
  }
  .quiz-header p {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }

  /* progress */
  .progress-wrap {
    margin-bottom: 32px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 400;
  }
  .progress-track {
    height: 2px;
    background: var(--muted2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* card */
  .step {
    display: none;
    animation: fadeUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
  }

  .step-q {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(16px, 3.5vw, 20px);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.35;
  }
  .step-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* options grid */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .options.cols-1 { grid-template-columns: 1fr; }
  .options.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 4px;
    user-select: none;
  }
  .opt:hover {
    border-color: var(--border-hover);
    background: #222;
    transform: translateY(-1px);
  }
  .opt.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .opt-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .opt-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .opt.selected .opt-title { color: var(--accent); }
  .opt-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Onest', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .btn-back:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-back:invisible { visibility: hidden; }
  .btn-next {
    flex: 1;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Unbounded', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .btn-next:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-next:active { transform: scale(0.98); }
  .btn-next:disabled { opacity: 0.3; cursor: default; }

  /* summary */
  .summary-table {
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .sum-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-row:nth-child(even) { background: var(--surface2); }
  .sum-key { color: var(--muted); min-width: 110px; flex-shrink: 0; }
  .sum-val { color: var(--text); font-weight: 500; }

  /* success screen */
  .success-screen { display: none; animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1); }
  .success-screen.active { display: block; }
  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 20px;
  }
  .success-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: var(--text);
  }
  .success-sub {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .btn-restart {
    display: block;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Onest', sans-serif;
    margin-top: 12px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-restart:hover { border-color: var(--border-hover); color: var(--text); }

  /* loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* error toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #3a1a1a;
    border: 1px solid #7a3333;
    color: #f9c0c0;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 420px) {
    .options { grid-template-columns: 1fr; }
    .options.cols-3 { grid-template-columns: 1fr 1fr; }
    .card { padding: 20px 18px; }
  }
</style>
</head>
<body>

<div class="quiz-shell">

  <div class="quiz-header">
    <div class="eyebrow">Дизайн-студия</div>
    <h1>Расскажите<br>о вашем проекте</h1>
    <p>9 вопросов — и мы поймём, что именно нужно сделать</p>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-meta">
      <span id="step-label">Шаг 1 из 9</span>
      <span id="step-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="steps-container"></div>

  <div class="success-screen card" id="success">
    <div class="success-icon">✓</div>
    <div class="success-title">Бриф отправлен!</div>
    <div class="success-sub">Мы получили ваши ответы и скоро свяжемся с вами.</div>
    <div class="summary-table" id="final-summary"></div>
    <button class="btn-restart" onclick="restart()">← Заполнить заново</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TG_TOKEN = '8627336682:AAESmAqmLRQG6Gbx0BCCHs9kDY2jKsNS1G4';
const TG_CHAT_ID = '1223500999'; // по умолчанию — тот же ID; замените на chat_id вашего чата/канала

const steps = [
  {
    id: 'project_type',
    q: 'Что нужно создать?',
    hint: 'Можно выбрать несколько форматов',
    multi: true,
    cols: 2,
    opts: [
      { icon: '🎨', title: 'Логотип / айдентика', sub: 'знак, шрифт, фирстиль' },
      { icon: '📄', title: 'Полиграфия', sub: 'буклет, листовка, плакат' },
      { icon: '💻', title: 'Диджитал', sub: 'баннеры, соцсети, сайт' },
      { icon: '📦', title: 'Упаковка', sub: 'этикетка, коробка' },
      { icon: '📊', title: 'Презентация', sub: 'pitch-deck, корп. шаблон' },
      { icon: '🏙️', title: 'Наружка / навигация', sub: 'вывески, указатели' },
    ]
  },
  {
    id: 'goal',
    q: 'Главная цель проекта?',
    hint: 'Что должен почувствовать зритель',
    multi: false,
    cols: 2,
    opts: [
      { icon: '👁️', title: 'Запомниться', sub: 'стать узнаваемым' },
      { icon: '🛒', title: 'Продать', sub: 'конвертировать в покупку' },
      { icon: '🤝', title: 'Вызвать доверие', sub: 'выглядеть серьёзно' },
      { icon: '📢', title: 'Объявить', sub: 'донести информацию' },
      { icon: '👥', title: 'Объединить', sub: 'корпоратив, команда' },
      { icon: '✨', title: 'Удивить', sub: 'вау-эффект, вирусность' },
    ]
  },
  {
    id: 'audience',
    q: 'Целевая аудитория?',
    hint: 'Кто увидит этот дизайн',
    multi: true,
    cols: 2,
    opts: [
      { icon: '💼', title: 'B2B / бизнес', sub: 'компании, менеджеры' },
      { icon: '🙋', title: 'Массовый B2C', sub: 'широкая аудитория' },
      { icon: '💎', title: 'Премиум', sub: 'высокий достаток' },
      { icon: '🔧', title: 'Проф. сообщество', sub: 'эксперты, специалисты' },
      { icon: '🎯', title: 'Молодёжь', sub: '18–30, трендовое' },
      { icon: '🏪', title: 'Локальный рынок', sub: 'город, регион' },
    ]
  },
  {
    id: 'style',
    q: 'Визуальный стиль?',
    hint: 'Выберите до двух вариантов',
    multi: true,
    cols: 2,
    opts: [
      { icon: '◻️', title: 'Минимализм', sub: 'чисто, пространство, воздух' },
      { icon: '🌈', title: 'Яркий / экспрессивный', sub: 'смелые цвета, энергия' },
      { icon: '🕰️', title: 'Классика / ретро', sub: 'традиции, надёжность' },
      { icon: '🤖', title: 'Технологичный', sub: 'hi-tech, футуризм' },
      { icon: '✏️', title: 'Рукотворный', sub: 'живость, тепло, hand-made' },
      { icon: '👑', title: 'Люкс / editorial', sub: 'сдержанность, премиум' },
    ]
  },
  {
    id: 'tone',
    q: 'Тон коммуникации?',
    hint: 'Как бренд говорит с аудиторией',
    multi: false,
    cols: 2,
    opts: [
      { icon: '👔', title: 'Формальный', sub: 'официально, по делу' },
      { icon: '☕', title: 'Дружелюбный', sub: 'тепло, разговорно' },
      { icon: '🔥', title: 'Дерзкий', sub: 'провокация, характер' },
      { icon: '🌙', title: 'Экспертный', sub: 'глубина, авторитет' },
      { icon: '🎉', title: 'Игривый', sub: 'весело, эмоция' },
    ]
  },
  {
    id: 'colors',
    q: 'Ограничения по цвету?',
    hint: 'Фирменные цвета или стоп-цвета',
    multi: false,
    cols: 2,
    opts: [
      { icon: '✅', title: 'Есть гайдлайн', sub: 'предоставим цвета' },
      { icon: '🎛️', title: 'Есть предпочтения', sub: 'расскажем на встрече' },
      { icon: '🆓', title: 'Нет ограничений', sub: 'полная свобода' },
      { icon: '🚫', title: 'Есть стоп-цвета', sub: 'определённые цвета нельзя' },
    ]
  },
  {
    id: 'references',
    q: 'Референсы?',
    hint: 'Примеры, которые нравятся или нет',
    multi: false,
    cols: 2,
    opts: [
      { icon: '📁', title: 'Есть готовые', sub: 'покажем подборку' },
      { icon: '🔍', title: 'Нужна помощь', sub: 'хотим получить от дизайнера' },
      { icon: '↔️', title: 'Нравится и нет', sub: 'покажем оба списка' },
      { icon: '○', title: 'Ничего нет', sub: 'открыты к любым идеям' },
    ]
  },
  {
    id: 'timeline',
    q: 'Дедлайн проекта?',
    hint: 'Реальные сроки — основа адекватного предложения',
    multi: false,
    cols: 2,
    opts: [
      { icon: '⚡', title: 'Срочно', sub: 'до 3 дней' },
      { icon: '📅', title: 'Стандарт', sub: '1–2 недели' },
      { icon: '🗓️', title: 'Комфортно', sub: '3–4 недели' },
      { icon: '📆', title: 'Долгий проект', sub: '1+ месяц' },
    ]
  },
  {
    id: 'budget',
    q: 'Бюджет проекта?',
    hint: 'Поможет предложить правильный объём работ',
    multi: false,
    cols: 2,
    opts: [
      { icon: '🪙', title: 'До 30 000 ₽', sub: 'базовый' },
      { icon: '💰', title: '30–100 000 ₽', sub: 'стандартный' },
      { icon: '⭐', title: '100–300 000 ₽', sub: 'расширенный' },
      { icon: '💎', title: '300 000+ ₽', sub: 'комплексный' },
      { icon: '🔒', title: 'Обсудим лично', sub: 'не хочу указывать' },
    ]
  }
];

const labels = {
  project_type: 'Тип проекта',
  goal: 'Цель',
  audience: 'Аудитория',
  style: 'Стиль',
  tone: 'Тон',
  colors: 'Цвета',
  references: 'Референсы',
  timeline: 'Дедлайн',
  budget: 'Бюджет'
};

let current = 0;
const answers = {};

function buildSteps() {
  const container = document.getElementById('steps-container');
  container.innerHTML = '';
  steps.forEach((s, idx) => {
    const div = document.createElement('div');
    div.className = 'step' + (idx === 0 ? ' active' : '');
    div.id = 'step-' + idx;
    div.innerHTML = `
      <div class="card">
        <div class="step-q">${s.q}</div>
        <div class="step-hint">${s.hint}</div>
        <div class="options cols-${s.cols}" id="opts-${idx}">
          ${s.opts.map(o => `
            <button class="opt" data-val="${o.title}" onclick="toggleOpt(this, ${idx})">
              <span class="opt-icon">${o.icon}</span>
              <span class="opt-title">${o.title}</span>
              <span class="opt-sub">${o.sub}</span>
            </button>
          `).join('')}
        </div>
        <div class="nav">
          ${idx > 0 ? `<button class="btn-back" onclick="goBack()">← Назад</button>` : `<span></span>`}
          <button class="btn-next" id="next-${idx}" disabled onclick="goNext(${idx})">${idx === steps.length - 1 ? 'Отправить бриф →' : 'Далее →'}</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleOpt(btn, stepIdx) {
  const s = steps[stepIdx];
  const id = s.id;
  const val = btn.dataset.val;
  const opts = document.querySelectorAll(`#opts-${stepIdx} .opt`);

  if (!s.multi) {
    opts.forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    answers[id] = [val];
  } else {
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      answers[id] = (answers[id] || []).filter(v => v !== val);
    } else {
      btn.classList.add('selected');
      answers[id] = [...(answers[id] || []), val];
    }
  }
  document.getElementById('next-' + stepIdx).disabled = !(answers[id] && answers[id].length > 0);
}

function goNext(idx) {
  if (idx === steps.length - 1) { submitBrief(); return; }
  document.getElementById('step-' + idx).classList.remove('active');
  current = idx + 1;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  document.getElementById('step-' + current).classList.remove('active');
  current--;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const pct = Math.round((current / steps.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('step-label').textContent = `Шаг ${current + 1} из ${steps.length}`;
  document.getElementById('step-pct').textContent = pct + '%';
}

function buildMessage() {
  const now = new Date().toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
  let msg = `📋 *Новый бриф на дизайн*\n`;
  msg += `🕐 ${now}\n\n`;
  steps.forEach(s => {
    const val = (answers[s.id] || []).join(', ') || '—';
    msg += `*${labels[s.id]}:* ${val}\n`;
  });
  return msg;
}

async function submitBrief() {
  const btn = document.getElementById('next-' + (steps.length - 1));
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Отправляем...';

  const msg = buildMessage();
  const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TG_CHAT_ID,
        text: msg,
        parse_mode: 'Markdown'
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description || 'Telegram API error');
    showSuccess();
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = origText;
    showToast('Ошибка отправки: ' + e.message);
    console.error(e);
  }
}

function showSuccess() {
  document.getElementById('progress-wrap').style.display = 'none';
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

  const summary = document.getElementById('final-summary');
  summary.innerHTML = steps.map(s => `
    <div class="sum-row">
      <span class="sum-key">${labels[s.id]}</span>
      <span class="sum-val">${(answers[s.id] || []).join(', ') || '—'}</span>
    </div>
  `).join('');

  const sc = document.getElementById('success');
  sc.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  current = 0;
  document.getElementById('success').classList.remove('active');
  document.getElementById('progress-wrap').style.display = '';
  buildSteps();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

buildSteps();
updateProgress();
</script>
</body>
</html>
